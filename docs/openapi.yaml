openapi: 3.0.3
info:
  title: 26年度春ハッカソン 01班 バックエンド仕様 API
  version: 1.0.0
paths:
  /api/me:
    get:
      operationId: getMe
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /api/rooms:
    get:
      operationId: getRooms
      responses:
        "201":
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
components:
  schemas:
    User:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: traQ ID
    Room:
      type: object
      required:
        - id
        - name
        - members
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        status:
          type: string
          enum:
            - waiting
            - playing
    CreateRoomRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 64
    RoomJoinEvent:
      type: object
      required:
        - roomId
      properties:
        roomId:
          type: string
          format: uuid
    DrawStrokeEvent:
      type: object
      required:
        - x1
        - y1
        - x2
        - y2
      properties:
        x1:
          type: number
          format: double
          minimum: 0
          maximum: 1
        y1:
          type: number
          format: double
          minimum: 0
          maximum: 1
        x2:
          type: number
          format: double
          minimum: 0
          maximum: 1
        y2:
          type: number
          format: double
          minimum: 0
          maximum: 1
    AnswerSubmitEvent:
      type: object
      required:
        - answer
      properties:
        answer:
          type: string
    RoomListUpdatedEvent:
      oneOf:
        - $ref: "#/components/schemas/RoomCreatedEvent"
        - $ref: "#/components/schemas/RoomUpdatedEvent"
        - $ref: "#/components/schemas/RoomDeletedEvent"
    RoomCreatedEvent:
      type: object
      required:
        - eventType
        - room
      properties:
        eventType:
          type: string
          enum:
            - room_created
        room:
          $ref: "#/components/schemas/Room"
    RoomUpdatedEvent:
      type: object
      required:
        - eventType
        - room
      properties:
        eventType:
          type: string
          enum:
            - room_updated
        room:
          $ref: "#/components/schemas/Room"
    RoomDeletedEvent:
      type: object
      required:
        - eventType
        - roomId
      properties:
        eventType:
          type: string
          enum:
            - room_deleted
        roomId:
          type: string
          format: uuid
    RoundStartedEvent:
      type: object
      required:
        - roundIndex
        - guesserId
        - kanji
      properties:
        roundIndex:
          type: integer
          description: 何文字目か（1-indexed）
        guesserId:
          type: string
          description: GuesserのtraQ ID
        kanji:
          type: string
          description: undefined
    TurnStartedEvent:
      type: object
      required:
        - turnIndex
        - drawerId
      properties:
        turnIndex:
          type: integer
          description: 何画目か（1-indexed）
        drawerId:
          type: string
          description: そのターンに線を引くdrawerのtraQ ID
    ClientDisconnectedEvent:
      type: object
      required:
        - userId
        - newDrawerId
      properties:
        userId:
          type: string
          description: 切断したユーザーのtraQ ID
        newDrawerId:
          type: string
          description: undefined
    RoundAnswerEvent:
      type: object
      required:
        - guesserAnswer
        - actualAnswer
      properties:
        guesserAnswer:
          type: string
          description: Guesserの回答
        actualAnswer:
          type: string
          description: 正しい答え
    GameEndEvent:
      type: object
      required:
        - cleared
        - totalTimeMs
        - remainingLives
        - rounds
      properties:
        cleared:
          type: boolean
          description: クリアしたかどうか
        totalTimeMs:
          type: integer
          description: かかった時間（ミリ秒）
        remainingLives:
          type: integer
          description: 残っている残機の数
        rounds:
          type: array
          items:
            $ref: "#/components/schemas/Round"
    Round:
      type: object
      required:
        - id
        - timeMs
        - guesserId
        - guesserAnswer
        - actualAnswer
        - strokes
      properties:
        id:
          type: string
          format: uuid
        timeMs:
          type: integer
          description: このラウンドにかかった時間（ミリ秒）
        guesserId:
          type: string
        guesserAnswer:
          type: string
        actualAnswer:
          type: string
        strokes:
          type: array
          items:
            $ref: "#/components/schemas/Stroke"
    Stroke:
      type: object
      required:
        - drawerId
        - x1
        - y1
        - x2
        - y2
      properties:
        drawerId:
          type: string
        x1:
          type: number
          format: double
          minimum: 0
          maximum: 1
        y1:
          type: number
          format: double
          minimum: 0
          maximum: 1
        x2:
          type: number
          format: double
          minimum: 0
          maximum: 1
        y2:
          type: number
          format: double
          minimum: 0
          maximum: 1
